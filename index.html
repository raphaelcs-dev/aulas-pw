    <script>
        function toggleSenha() {
            const input = document.getElementById('senha');
            const eyeOn = document.getElementById('icon-eye');
            const eyeOff = document.getElementById('icon-eye-off');

            if (input.type === 'password') {
                input.type = 'text';
                eyeOn.style.display = 'none';
                eyeOff.style.display = 'block';
            } else {
                input.type = 'password';
                eyeOn.style.display = 'block';
                eyeOff.style.display = 'none';
            }
        }

        // Validação em tempo real da confirmação de senha
        document.getElementById('confirma_senha').addEventListener('input', function () {
            const senha = document.getElementById('senha').value;
            const erro = document.getElementById('erro-senha');
            if (this.value && this.value !== senha) {
                erro.textContent = 'As senhas não coincidem.';
            } else {
                erro.textContent = '';
            }
        });

        // Previne submit se as senhas não baterem
        document.querySelector('form').addEventListener('submit', function (e) {
            const senha = document.getElementById('senha').value;
            const confirma = document.getElementById('confirma_senha').value;
            if (senha !== confirma) {
                e.preventDefault();
                document.getElementById('erro-senha').textContent = 'As senhas não coincidem.';
            }
        });
    </script>
